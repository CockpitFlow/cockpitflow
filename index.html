<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CockpitFlow</title>
    <style>
      body { margin: 0; background: #06080c; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 12px; background: #06080c;
        transition: opacity 0.3s;
      }
      #splash.hide { opacity: 0; pointer-events: none; }
      #splash span {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 18px; font-weight: 900; letter-spacing: 6px;
        color: #4a9eff;
      }
      #splash small {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 9px; letter-spacing: 3px; color: #3a4560;
      }
      #splash .dot {
        width: 4px; height: 4px; border-radius: 50%;
        background: #4a9eff; margin-top: 8px;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
  </head>
  <body>
    <div id="splash">
      <span>COCKPITFLOW</span>
      <small>COCKPIT COMPANION</small>
      <div class="dot"></div>
    </div>
    <div id="app"></div>
    <script>
      // Unregister any service workers — they break Tauri IPC
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
      // Hide splash when app mounts
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) { splash.classList.add('hide'); setTimeout(() => splash.remove(), 300); }
        }, 800);
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
