<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cessna 172S</title>
<link rel="stylesheet" href="/cf-theme.css">
<style>
html,body{height:100dvh;width:100vw;overflow:hidden;background:var(--cf-bg);color:var(--cf-text);
  font-family:var(--cf-font-mono);touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}

/* Portrait lock */
.port{display:none;position:fixed;inset:0;z-index:999;background:var(--cf-bg);
  flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--cf-dim)}
.port svg{width:40px;height:40px;color:var(--cf-accent);animation:sp 2s ease-in-out infinite}
.port span{font-family:var(--cf-font-display);font-size:9px;letter-spacing:3px;font-weight:700}
@keyframes sp{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media(orientation:portrait){.port{display:flex}.pit{display:none!important}}

/* ============================================
   MAIN LAYOUT — horizontal strip
   [THR][MIX] [SWITCHES 5x2] [FLAPS][TRIM] [GAUGES/YOKE]
   ============================================ */
.pit{
  display:flex;
  width:100vw;height:100dvh;
  padding:3px;gap:3px;
}

.pnl{background:var(--cf-surface);border-radius:8px;border:1px solid var(--cf-border)}

/* === LEVERS (THR + MIX) === */
.levers{width:110px;display:flex;gap:6px;padding:6px 6px;flex-shrink:0}
.lv{flex:1;display:flex;flex-direction:column;align-items:center;cursor:grab;touch-action:none;-webkit-user-select:none}
.lv-l{font-family:var(--cf-font-display);font-size:7px;font-weight:700;letter-spacing:1px;color:var(--cf-dim);margin-bottom:4px}
.lv-t{width:28px;flex:1;background:linear-gradient(90deg,#0a0f16,var(--cf-surface2),#0a0f16);
  border-radius:10px;position:relative;border:1px solid var(--cf-border);
  box-shadow:inset 3px 0 6px rgba(0,0,0,.5),inset -3px 0 6px rgba(0,0,0,.5)}
.lv-f{position:absolute;bottom:0;left:2px;right:2px;border-radius:6px;opacity:.25}
.lv-k{position:absolute;left:50%;transform:translateX(-50%);width:40px;height:24px;
  background:linear-gradient(180deg,#3a4458,#252d3c,#1a2234);border-radius:4px;cursor:grab;
  box-shadow:0 3px 8px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.12),inset 0 -1px 0 rgba(0,0,0,.3)}
.lv-k::after{content:'';position:absolute;top:50%;left:4px;right:4px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.lv-k.bl{border:2px solid var(--cf-accent);box-shadow:0 3px 8px rgba(0,0,0,.6),0 0 6px rgba(74,158,255,.15),inset 0 1px 0 rgba(255,255,255,.12)}
.lv-k.rd{border:2px solid var(--cf-red);box-shadow:0 3px 8px rgba(0,0,0,.6),0 0 6px rgba(231,76,60,.15),inset 0 1px 0 rgba(255,255,255,.12)}
.lv-v{font-size:12px;font-weight:700;margin-top:3px}

/* === SWITCHES 5x2 === */
.switches{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr) 1fr 1fr;gap:2px;padding:2px}
.sw{display:flex;flex-direction:row;align-items:center;justify-content:flex-start;gap:6px;padding:0 8px;
  background:var(--cf-surface);border:1.5px solid var(--cf-border);border-radius:6px;cursor:pointer;transition:all .1s}
.sw:active{transform:scale(.95)}
.sw-d{width:6px;height:6px;border-radius:50%;background:#1a2030;flex-shrink:0;transition:all .15s}
.sw.on .sw-d{background:var(--cf-green);box-shadow:0 0 8px var(--cf-green)}
.sw.on.red .sw-d{background:var(--cf-red);box-shadow:0 0 8px var(--cf-red)}
.sw.on{border-color:rgba(46,204,113,.3);background:rgba(46,204,113,.04)}
.sw.on.red{border-color:rgba(231,76,60,.3);background:rgba(231,76,60,.04)}
.sw-l{font-family:var(--cf-font-display);font-size:8px;font-weight:700;letter-spacing:.5px;color:var(--cf-dim)}
.sw.on .sw-l{color:var(--cf-text)}

/* === FLAPS + TRIM === */
.ftcol{width:50px;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.flaps{flex:3;display:flex;flex-direction:column;gap:2px;padding:3px}
.fl-l{font-family:var(--cf-font-display);font-size:5px;font-weight:700;letter-spacing:1px;color:var(--cf-dim);text-align:center;padding:1px}
.fl-b{flex:1;border:1.5px solid var(--cf-border);background:var(--cf-surface2);color:var(--cf-dim);font-family:var(--cf-font-display);
  font-size:9px;font-weight:700;letter-spacing:1px;border-radius:5px;cursor:pointer;transition:all .1s;
  display:flex;align-items:center;justify-content:center}
.fl-b:active{transform:scale(.93)}
.fl-b.on{border-color:var(--cf-accent);color:var(--cf-accent);background:rgba(74,158,255,.06)}
.trimw{flex:2;background:linear-gradient(90deg,#151515,#2a2a2a,#383838,#2a2a2a,#151515);
  border-radius:6px;border:1px solid #444;box-shadow:inset 2px 0 5px rgba(0,0,0,.5),inset -2px 0 5px rgba(0,0,0,.5);
  cursor:grab;overflow:hidden;position:relative}
.trimw:active{cursor:grabbing}
.tr-gr{position:absolute;inset:0;display:flex;flex-direction:column;gap:4px;padding:2px 0;pointer-events:none}
.tr-g{width:65%;height:2px;margin:0 auto;background:linear-gradient(180deg,rgba(0,0,0,.5),rgba(0,0,0,.2));
  border-radius:1px;box-shadow:0 1px 0 rgba(255,255,255,.06)}
.tr-i{position:absolute;bottom:1px;left:0;right:0;text-align:center;pointer-events:none}
.tr-v{font-size:9px;font-weight:700;color:var(--cf-accent)}

/* === RIGHT SIDE (gauges + yoke) === */
.right{width:33%;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.gauges{display:flex;gap:6px;align-items:center;justify-content:center;padding:4px 8px;flex-shrink:0}
.gbox{display:flex;flex-direction:column;align-items:center}
.g-l{font-family:var(--cf-font-display);font-size:6px;font-weight:700;letter-spacing:1.5px;color:var(--cf-dim)}
.g-v{font-size:18px;font-weight:700;line-height:1.1}
.g-u{font-size:5px;color:var(--cf-dim);letter-spacing:1px}

/* Button groups (magneto, fuel) */
.grp{display:flex;align-items:center;gap:2px;background:var(--cf-surface);border:1px solid var(--cf-border);border-radius:6px;padding:4px 6px}
.grp-l{font-family:var(--cf-font-display);font-size:6px;font-weight:700;letter-spacing:1px;color:var(--cf-dim);margin-right:4px;flex-shrink:0}
.gb{flex:1;padding:6px 2px;border:1px solid var(--cf-border);background:var(--cf-surface2);color:var(--cf-dim);font-family:var(--cf-font-display);
  font-size:8px;font-weight:700;letter-spacing:.5px;border-radius:4px;cursor:pointer;transition:all .1s;text-align:center}
.gb:active{transform:scale(.93)}
.gb-on{border-color:var(--cf-accent);color:var(--cf-accent);background:rgba(74,158,255,.08)}
.gb-st{border-color:var(--cf-red);color:var(--cf-red)}
.gb-st:active{background:rgba(231,76,60,.1)}

/* Header buttons */
.hb{padding:3px 8px;background:var(--cf-surface);border:1px solid var(--cf-border);border-radius:4px;
  color:var(--cf-dim);font-family:var(--cf-font-display);font-size:7px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .1s}
.hb:active{transform:scale(.93)}
.hb-on{border-color:var(--cf-accent);color:var(--cf-accent);background:rgba(74,158,255,.08)}

/* === YOKE === */
.yoke{flex:1;position:relative;overflow:hidden;touch-action:none}
.yk-a{position:absolute;inset:0;touch-action:none;z-index:1}
.yk-h,.yk-v{position:absolute;background:var(--cf-border);pointer-events:none}
.yk-h{top:50%;left:6%;right:6%;height:1px}.yk-v{left:50%;top:6%;bottom:6%;width:1px}
.yk-r{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  border:1px solid rgba(74,158,255,.08);border-radius:50%;width:min(88%,88vh);aspect-ratio:1;pointer-events:none}
.yk-d{position:absolute;width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,158,255,.8),rgba(74,158,255,.05));
  box-shadow:0 0 24px rgba(74,158,255,.25),0 0 48px rgba(74,158,255,.08);
  transform:translate(-50%,-50%);top:50%;left:50%;transition:all 30ms;pointer-events:none}
</style>
</head>
<body>
<div class="port"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M12 18h.01"/></svg><span>ROTATE LANDSCAPE</span></div>

<div class="pit">
  <!-- LEVERS -->
  <div class="pnl levers">
    <div class="lv" id="thr"><span class="lv-l">THR</span><div class="lv-t"><div class="lv-f" style="height:0%;background:var(--cf-accent)"></div><div class="lv-k bl" style="bottom:0%"></div></div><span class="lv-v" style="color:var(--cf-accent)">0</span></div>
    <div class="lv" id="mix"><span class="lv-l">MIX</span><div class="lv-t"><div class="lv-f" style="height:100%;background:var(--cf-red)"></div><div class="lv-k rd" style="bottom:100%"></div></div><span class="lv-v" style="color:var(--cf-red)">100</span></div>
  </div>

  <!-- SWITCHES 5x2 -->
  <div class="pnl switches">
    <div class="sw red on" data-cmd="PARKING_BRAKE"><div class="sw-d"></div><span class="sw-l">P.BRK</span></div>
    <div class="sw red" data-cmd="MASTER_ALT"><div class="sw-d"></div><span class="sw-l">ALT</span></div>
    <div class="sw red" data-cmd="MASTER_BATTERY"><div class="sw-d"></div><span class="sw-l">BAT</span></div>
    <div class="sw" data-cmd="AVIONICS_MASTER"><div class="sw-d"></div><span class="sw-l">AVIO</span></div>
    <div class="sw" data-cmd="FUEL_PUMP"><div class="sw-d"></div><span class="sw-l">PUMP</span></div>
    <div class="sw" data-cmd="BEACON"><div class="sw-d"></div><span class="sw-l">BCN</span></div>
    <div class="sw" data-cmd="LANDING_LIGHT"><div class="sw-d"></div><span class="sw-l">LAND</span></div>
    <div class="sw" data-cmd="NAV_LIGHT"><div class="sw-d"></div><span class="sw-l">NAV</span></div>
    <div class="sw" data-cmd="STROBE"><div class="sw-d"></div><span class="sw-l">STRB</span></div>
    <div class="sw" data-cmd="PITOT_HEAT"><div class="sw-d"></div><span class="sw-l">PITOT</span></div>
    <div class="sw" data-cmd="TAXI_LIGHT"><div class="sw-d"></div><span class="sw-l">TAXI</span></div>
    <div class="sw" data-cmd="CARB_HEAT"><div class="sw-d"></div><span class="sw-l">CARB</span></div>
    <!-- Magneto row -->
    <div class="grp" style="grid-column:1/4"><span class="grp-l">MAG</span>
      <button class="gb" data-mag="0">OFF</button><button class="gb" data-mag="1">R</button>
      <button class="gb" data-mag="2">L</button><button class="gb gb-on" data-mag="3">BOTH</button>
      <button class="gb gb-st" data-mag="4">START</button>
    </div>
    <!-- Fuel selector row -->
    <div class="grp" style="grid-column:1/4"><span class="grp-l">FUEL</span>
      <button class="gb" data-fuel="1">LEFT</button><button class="gb gb-on" data-fuel="2">BOTH</button>
      <button class="gb" data-fuel="3">RIGHT</button>
    </div>
  </div>

  <!-- FLAPS + TRIM -->
  <div class="ftcol">
    <div class="pnl flaps"><span class="fl-l">FLAPS</span>
      <button class="fl-b on" data-v="0">UP</button><button class="fl-b" data-v="0.33">10°</button>
      <button class="fl-b" data-v="0.66">20°</button><button class="fl-b" data-v="1">FULL</button>
    </div>
    <div class="pnl trimw" id="trimW"><div class="tr-gr" id="trimGr"></div><div class="tr-i"><span class="tr-v" id="trimV">0</span></div></div>
  </div>

  <!-- RIGHT: nav + gauges + yoke -->
  <div class="right">
    <!-- Nav bar -->
    <div class="pnl" style="display:flex;align-items:center;padding:3px 6px;gap:3px;flex-shrink:0">
      <button class="hb" id="btnBack">&#9664; BACK</button>
      <button class="hb hb-on" id="btnTouch">TOUCH</button>
      <button class="hb" id="btnGyro">GYRO</button>
      <button class="hb" id="btnCtr">CTR</button>
      <button class="hb" id="btnPause">&#10074;&#10074;</button>
    </div>
    <!-- Gauges -->
    <div class="pnl" style="display:flex;align-items:center;justify-content:space-around;padding:2px 8px;flex-shrink:0">
      <div class="gbox"><span class="g-l">IAS</span><span class="g-v" style="color:var(--cf-accent);font-size:22px" id="rI">0</span><span class="g-u">KTS</span></div>
      <div class="gbox"><span class="g-l">ALT</span><span class="g-v" style="font-size:22px" id="rA">0</span><span class="g-u">FT</span></div>
      <div class="gbox"><span class="g-l">HDG</span><span class="g-v" style="color:var(--cf-green);font-size:22px" id="rH">---</span><span class="g-u">°</span></div>
      <div class="gbox"><span class="g-l">VS</span><span class="g-v" style="color:var(--cf-amber);font-size:22px" id="rV">0</span><span class="g-u">FPM</span></div>
    </div>
    <div class="pnl yoke"><div class="yk-a" id="ykA"><div class="yk-h"></div><div class="yk-v"></div><div class="yk-r"></div><div class="yk-d" id="yd"></div></div></div>
  </div>
</div>

<script>
const API=new URLSearchParams(location.search).get('api')||location.origin;
const snd=(c,v)=>fetch(API+'/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd:c,value:v})}).catch(()=>{});

// Levers
['thr','mix'].forEach(id=>{
  const el=document.getElementById(id),tr=el.querySelector('.lv-t'),fl=el.querySelector('.lv-f'),kb=el.querySelector('.lv-k'),vl=el.querySelector('.lv-v');
  const cm=id==='thr'?'THROTTLE':'MIXTURE';let val=id==='mix'?1:0,drag=false;
  const upd=v=>{val=Math.max(0,Math.min(1,v));const p=val*100;fl.style.height=p+'%';kb.style.bottom=`calc(${p}% - 8px)`;vl.textContent=Math.round(p)};
  const mv=y=>{const r=tr.getBoundingClientRect();upd(1-(y-r.top)/r.height);snd(cm,val)};
  el.onpointerdown=e=>{e.preventDefault();drag=true;el.setPointerCapture(e.pointerId);mv(e.clientY)};
  el.onpointermove=e=>{if(drag)mv(e.clientY)};el.onpointerup=el.onpointercancel=()=>{drag=false};
  upd(val);
});

// Yoke
(function(){
  const a=document.getElementById('ykA'),d=document.getElementById('yd');let t=false;
  const mv=(x,y)=>{if(typeof gyroActive!=='undefined'&&gyroActive)return;const r=a.getBoundingClientRect();const ax=Math.max(-1,Math.min(1,((x-r.left)/r.width)*2-1));const ey=Math.max(-1,Math.min(1,((y-r.top)/r.height)*2-1));d.style.left=((ax+1)/2*100)+'%';d.style.top=((ey+1)/2*100)+'%';snd('AILERON',ax);snd('ELEVATOR',ey)};
  const ctr=()=>{if(typeof gyroActive!=='undefined'&&gyroActive)return;d.style.left='50%';d.style.top='50%';snd('AILERON',0);snd('ELEVATOR',0)};
  a.onpointerdown=e=>{e.preventDefault();t=true;a.setPointerCapture(e.pointerId);mv(e.clientX,e.clientY)};
  a.onpointermove=e=>{if(t)mv(e.clientX,e.clientY)};a.onpointerup=a.onpointercancel=()=>{if(t){t=false;ctr()}};
  window.addEventListener('message',e=>{if(e.data?.type==='capacitor-orientation'){const ai=Math.max(-1,Math.min(1,(e.data.gamma||0)/45));const el=Math.max(-1,Math.min(1,(e.data.beta||0)/35));d.style.left=((ai+1)/2*100)+'%';d.style.top=((el+1)/2*100)+'%'}});
})();

// Flaps
document.querySelectorAll('.fl-b').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.fl-b').forEach(x=>x.classList.remove('on'));b.classList.add('on');snd('FLAPS',parseFloat(b.dataset.v))}});

// Trim wheel
(function(){
  const w=document.getElementById('trimW'),gr=document.getElementById('trimGr'),vEl=document.getElementById('trimV');
  for(let i=0;i<30;i++){const g=document.createElement('div');g.className='tr-g';gr.appendChild(g)}
  let val=0,drag=false,lastY=0,gOff=0;
  w.onpointerdown=e=>{e.preventDefault();drag=true;lastY=e.clientY;w.setPointerCapture(e.pointerId)};
  w.onpointermove=e=>{if(!drag)return;const dy=e.clientY-lastY;lastY=e.clientY;val=Math.max(-1,Math.min(1,val+dy*.006));snd('TRIM',val);gOff+=dy;gr.style.transform=`translateY(${gOff%7}px)`;vEl.textContent=Math.round(val*100)};
  w.onpointerup=w.onpointercancel=()=>{drag=false};
})();

// Switches
document.querySelectorAll('.sw').forEach(s=>{s.onclick=()=>{s.classList.toggle('on');snd(s.dataset.cmd,s.classList.contains('on')?1:0)}});
snd('PARKING_BRAKE',1);

// Magneto selector
document.querySelectorAll('[data-mag]').forEach(b=>{b.onclick=()=>{
  const v=parseInt(b.dataset.mag);
  document.querySelectorAll('[data-mag]').forEach(x=>x.classList.remove('gb-on'));
  b.classList.add('gb-on');
  snd('MAGNETO',v);
  // START springs back to BOTH
  if(v===4)setTimeout(()=>{b.classList.remove('gb-on');document.querySelector('[data-mag="3"]').classList.add('gb-on');snd('MAGNETO',3)},500);
}});

// Fuel selector
document.querySelectorAll('[data-fuel]').forEach(b=>{b.onclick=()=>{
  document.querySelectorAll('[data-fuel]').forEach(x=>x.classList.remove('gb-on'));
  b.classList.add('gb-on');
  snd('FUEL_SEL',parseInt(b.dataset.fuel));
}});

// Header buttons
document.getElementById('btnBack').onclick=()=>{ history.back(); };
document.getElementById('btnPause').onclick=()=>{
  snd('PAUSE',1);
  const b=document.getElementById('btnPause');
  b.classList.toggle('hb-on');
};

// TOUCH/GYRO mode — sends message to parent Capacitor app
document.getElementById('btnTouch').onclick=()=>{
  document.getElementById('btnTouch').classList.add('hb-on');
  document.getElementById('btnGyro').classList.remove('hb-on');
  try{window.parent.postMessage({type:'cf-gyro-mode',active:false},'*')}catch{}
};
// Gyro control — native plugin sends HTTP directly, we just toggle it via API
let gyroActive=false;

const gyroApi=(active)=>fetch(API+'/api/mobile-gyro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({active})}).catch(()=>{});

document.getElementById('btnGyro').onclick=()=>{
  gyroActive=true;
  document.getElementById('btnGyro').classList.add('hb-on');
  document.getElementById('btnTouch').classList.remove('hb-on');
  gyroApi(true);
};
document.getElementById('btnTouch').onclick=()=>{
  gyroActive=false;
  document.getElementById('btnTouch').classList.add('hb-on');
  document.getElementById('btnGyro').classList.remove('hb-on');
  gyroApi(false);
  snd('AILERON',0);snd('ELEVATOR',0);
  document.getElementById('yd').style.left='50%';
  document.getElementById('yd').style.top='50%';
};
document.getElementById('btnCtr').onclick=()=>{ gyroApi('center'); };

// Default: gyro off
gyroApi(false);

// Poll gauges
async function poll(){
  try{const r=await fetch(API+'/api/sim-state');const d=await r.json();const v=d.values||{};
    if(v.AIRSPEED!==undefined){const s=Math.round(v.AIRSPEED);document.getElementById('rI').textContent=s;document.getElementById('rI').style.color=s<45?'var(--cf-red)':s<60?'var(--cf-amber)':'var(--cf-accent)'}
    if(v.ALTITUDE!==undefined)document.getElementById('rA').textContent=Math.round(v.ALTITUDE);
    if(v.HEADING!==undefined)document.getElementById('rH').textContent=Math.round(v.HEADING).toString().padStart(3,'0');
    if(v.VS!==undefined){const vs=Math.round(v.VS);document.getElementById('rV').textContent=(vs>=0?'+':'')+vs;document.getElementById('rV').style.color=vs<-1000?'var(--cf-red)':'var(--cf-amber)'}
  }catch{}
  setTimeout(poll,500);
}
poll();
</script>
</body>
</html>
