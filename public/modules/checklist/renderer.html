<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CockpitFlow Checklist</title>
<link rel="stylesheet" href="/cf-theme.css">
<style>
html,body{height:100dvh;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-tap-highlight-color:transparent}
.app{display:flex;flex-direction:column;height:100dvh}

/* Topbar */
.topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--cf-surface);border-bottom:1px solid var(--cf-border);flex-shrink:0}
.topbar-title{font-family:var(--cf-font-display);font-size:9px;color:var(--cf-dim);letter-spacing:2px;flex:1}
.topbar-badge{font-family:var(--cf-font-mono);font-size:7px;padding:2px 6px;border-radius:3px;letter-spacing:.5px}
.topbar-badge.mode-strict{background:rgba(227,179,65,.08);color:var(--cf-amber);border:1px solid rgba(227,179,65,.2)}
.topbar-badge.mode-smart{background:rgba(74,158,255,.08);color:var(--cf-accent);border:1px solid rgba(74,158,255,.2)}
.topbar-badge.auto{background:rgba(52,208,88,.08);color:var(--cf-green);border:1px solid rgba(52,208,88,.2)}
.topbar-badge.fb{background:rgba(74,158,255,.08);color:var(--cf-accent);border:1px solid rgba(74,158,255,.2)}
.topbar-btn{padding:4px 8px;background:none;border:1px solid var(--cf-border);border-radius:3px;color:var(--cf-dim);font-size:9px;cursor:pointer}
.topbar-btn:active{border-color:var(--cf-accent);color:var(--cf-accent)}
.topbar-btn.emergency{border-color:rgba(234,74,90,.3);color:var(--cf-red);font-weight:700}
.topbar-btn.emergency:active{background:rgba(234,74,90,.08)}
.topbar-btn.voice{border-color:rgba(52,208,88,.3);color:var(--cf-green)}
.topbar-btn.voice.on{background:rgba(52,208,88,.08)}

/* Search */
.search-bar{display:flex;padding:4px 12px;background:var(--cf-surface);border-bottom:1px solid var(--cf-border);flex-shrink:0}
.search-input{width:100%;padding:6px 10px;background:var(--cf-bg);border:1px solid var(--cf-border);border-radius:4px;color:var(--cf-text);font-size:12px;outline:none;font-family:inherit}
.search-input:focus{border-color:var(--cf-accent)}
.search-input::placeholder{color:var(--cf-dark)}

/* Phase tabs */
.phase-bar{display:flex;overflow-x:auto;flex-shrink:0;background:var(--cf-surface);border-bottom:1px solid var(--cf-border);padding:0 4px;gap:2px}
.phase-bar::-webkit-scrollbar{height:0}
.phase-tab{padding:10px 14px;border:none;background:none;color:var(--cf-dim);font-family:var(--cf-font-mono);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;transition:all .1s}
.phase-tab.on{color:var(--cf-accent);border-bottom-color:var(--cf-accent)}
.phase-tab.done{color:var(--cf-green)}
.phase-count{font-size:9px;color:var(--cf-dim);margin-left:4px;opacity:.6}
.phase-timer{font-size:8px;color:var(--cf-dim);margin-left:4px;font-family:var(--cf-font-mono)}

/* Items */
.items{flex:1;overflow-y:auto;padding:6px 8px}
.item{display:flex;align-items:flex-start;gap:12px;padding:16px 14px;margin-bottom:4px;background:var(--cf-surface);border:1px solid var(--cf-border);border-radius:8px;cursor:pointer;transition:all .12s;min-height:58px}
.item:active{background:var(--cf-surface2)}
.item.checked{border-color:rgba(52,208,88,.15)}
.item.checked .chk{background:var(--cf-green);border-color:var(--cf-green)}
.item.checked .chk::after{display:block}
.item.checked .i-label{text-decoration:line-through;color:var(--cf-dim)}
.item.locked{opacity:.3;pointer-events:none}
.item.current{border-color:var(--cf-accent);background:rgba(74,158,255,.03)}
.item.hidden{display:none}
.item.swipe-mode{border-left:3px solid transparent;transition:border-left-color .2s}
.item.swipe-mode:not(.checked):not(.locked){border-left-color:rgba(74,158,255,.15)}
.chk{width:26px;height:26px;border-radius:6px;flex-shrink:0;border:2px solid var(--cf-border);position:relative;transition:all .12s;margin-top:1px}
.chk::after{content:'';display:none;position:absolute;left:7px;top:2px;width:7px;height:13px;border:solid #fff;border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.i-body{flex:1;min-width:0}
.i-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.i-label{font-size:15px;font-weight:600;line-height:1.3}
.i-expected{font-family:var(--cf-font-mono);font-size:12px;color:var(--cf-accent);font-weight:700;padding:2px 8px;background:rgba(74,158,255,.06);border-radius:3px}
.i-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:8px}
.i-dot.ok{background:var(--cf-green);box-shadow:0 0 4px var(--cf-green)}
.i-dot.fail{background:var(--cf-red);box-shadow:0 0 4px var(--cf-red)}
.i-dot.unknown{background:var(--cf-dim)}
.i-how{font-size:12px;color:var(--cf-dim);margin-top:8px;line-height:1.4;display:none;padding:8px 0;border-top:1px solid rgba(255,255,255,.03)}
.i-loc{font-family:var(--cf-font-mono);font-size:10px;color:var(--cf-dim);opacity:.6;margin-top:4px}
.item.expanded .i-how{display:block}

/* Bottom */
.bottom{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--cf-surface);border-top:1px solid var(--cf-border);flex-shrink:0;flex-wrap:wrap;gap:6px}
.progress{display:flex;align-items:center;gap:8px}
.progress-text{font-family:var(--cf-font-mono);font-size:12px;color:var(--cf-dim)}
.progress-text strong{color:var(--cf-green)}
.progress-bar{width:80px;height:4px;background:var(--cf-border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--cf-green);border-radius:2px;transition:width .2s}
.bottom-btns{display:flex;gap:4px}
.b-btn{padding:10px 18px;background:none;border:1.5px solid var(--cf-border);border-radius:6px;color:var(--cf-dim);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--cf-font-mono);letter-spacing:.5px;min-height:40px;transition:all .12s}
.b-btn:active{border-color:var(--cf-accent);color:var(--cf-accent);background:rgba(74,158,255,.04)}
.b-btn.next{border-color:rgba(52,208,88,.3);color:var(--cf-green)}
.b-btn.undo{border-color:rgba(227,179,65,.3);color:var(--cf-amber)}
.b-btn.danger{border-color:rgba(234,74,90,.2);color:var(--cf-dim)}
.b-btn.danger:active{border-color:var(--cf-red);color:var(--cf-red)}

.loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--cf-dim);font-family:var(--cf-font-display);font-size:10px;letter-spacing:2px}
</style>
</head>
<body>
<div class="app" id="clApp">
  <div class="loading" id="loadMsg">LOADING...</div>
</div>

<script>
const _p = new URLSearchParams(window.location.search);
const API = _p.get('api') || window.location.origin;

let checklist = null, currentPhase = 0, checked = {}, phaseChanged = true;
let settings = { mode: 'smart', auto_check: 'on', check_feedback: 'on', haptic: 'on', sound: 'on', check_method: 'tap', auto_advance: 'on' };
let simValues = {};
let searchQuery = '';
let undoStack = []; // [{itemId, phaseIdx}]
let phaseTimers = {}; // {phaseId: startTime}
let voiceEnabled = false;
let lastPhaseDone = {};

function saveChecked(id) {
  localStorage.setItem('cockpitflow_cl_' + id, JSON.stringify(checked));
  // Sync to server for multi-crew
  fetch(API + '/api/checklist-progress', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(checked),
  }).catch(() => {});
}
function loadChecked(id) {
  try { checked = JSON.parse(localStorage.getItem('cockpitflow_cl_' + id) || '{}'); } catch { checked = {}; }
  // Also load from server (other crew may have checked items)
  fetch(API + '/api/checklist-progress').then(r => r.json()).then(server => {
    if (server && typeof server === 'object') {
      let changed = false;
      for (const [k, v] of Object.entries(server)) {
        if (v && !checked[k]) { checked[k] = true; changed = true; }
      }
      if (changed) { localStorage.setItem('cockpitflow_cl_' + id, JSON.stringify(checked)); renderChecklist(); }
    }
  }).catch(() => {});
}

// ═══ HAPTIC ═══
function vibrate(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch {}
}

// ═══ SOUNDS ═══
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.value = 0.1;
    if (type === 'check') { osc.frequency.value = 880; osc.type = 'sine'; gain.gain.value = 0.05; }
    else if (type === 'phase') { osc.frequency.value = 660; osc.type = 'sine'; gain.gain.value = 0.08; }
    else if (type === 'complete') { osc.frequency.value = 1320; osc.type = 'sine'; }
    osc.start(); osc.stop(ctx.currentTime + 0.1);
    if (type === 'phase' || type === 'complete') {
      setTimeout(() => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); g2.gain.value = 0.08; o2.frequency.value = type === 'complete' ? 1760 : 880; o2.type = 'sine'; o2.start(); o2.stop(ctx.currentTime + 0.15); }, 120);
    }
  } catch {}
}

// ═══ VOICE ═══
function speak(text) {
  if (!voiceEnabled || !window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9; u.pitch = 1; u.volume = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// ═══ TIMER ═══
function startPhaseTimer(phaseId) {
  if (!phaseTimers[phaseId]) phaseTimers[phaseId] = Date.now();
}
function getPhaseTime(phaseId) {
  if (!phaseTimers[phaseId]) return '';
  const s = Math.floor((Date.now() - phaseTimers[phaseId]) / 1000);
  const m = Math.floor(s / 60);
  return m > 0 ? `${m}m${String(s % 60).padStart(2, '0')}s` : `${s}s`;
}

// ═══ INIT ═══
async function init() {
  try {
    const r = await fetch(API + '/api/settings');
    if (r.ok) { const s = await r.json(); Object.assign(settings, s); }
  } catch {}

  const presetId = _p.get('preset') || 'cessna-172';
  try {
    const r = await fetch(API + '/api/module/checklist/preset/' + presetId);
    if (!r.ok) throw new Error('Not found');
    checklist = await r.json();
    checklist._id = presetId;
    currentPhase = 0;
    loadChecked(presetId);
    renderChecklist();
    startPoll();
    // Update timer display every second
    setInterval(() => {
      document.querySelectorAll('.phase-timer').forEach((el, i) => {
        const phase = checklist.phases[i];
        if (phase && phaseTimers[phase.id]) el.textContent = getPhaseTime(phase.id);
      });
    }, 1000);
  } catch {
    document.getElementById('loadMsg').textContent = 'CHECKLIST NOT FOUND: ' + presetId;
  }
}

// ═══ RENDER ═══
function renderChecklist() {
  const app = document.getElementById('clApp');
  app.innerHTML = '';

  // Start timer for current phase
  startPhaseTimer(checklist.phases[currentPhase].id);

  // Find emergency phase
  const emergencyIdx = checklist.phases.findIndex(p => /emerg|abnormal|failure/i.test(p.name));

  // Topbar
  const topbar = document.createElement('div');
  topbar.className = 'topbar';
  topbar.innerHTML = `
    <span class="topbar-title">${checklist.name || 'CHECKLIST'}</span>
    <span class="topbar-badge mode-${settings.mode}">${settings.mode.toUpperCase()}</span>
    ${settings.auto_check === 'on' ? '<span class="topbar-badge auto">AUTO</span>' : ''}
    ${settings.check_feedback === 'on' ? '<span class="topbar-badge fb">DOTS</span>' : ''}
    <button class="topbar-btn voice ${voiceEnabled ? 'on' : ''}" onclick="voiceEnabled=!voiceEnabled;renderChecklist()">&#128362; ${voiceEnabled ? 'ON' : 'OFF'}</button>
    ${emergencyIdx >= 0 ? `<button class="topbar-btn emergency" onclick="currentPhase=${emergencyIdx};phaseChanged=true;renderChecklist()">&#9888; EMRG</button>` : ''}
  `;
  app.appendChild(topbar);

  // Search bar
  const searchBar = document.createElement('div');
  searchBar.className = 'search-bar';
  searchBar.innerHTML = `<input class="search-input" placeholder="Search items..." value="${searchQuery}" oninput="searchQuery=this.value;filterItems()">`;
  app.appendChild(searchBar);

  // Phase tabs
  const bar = document.createElement('div');
  bar.className = 'phase-bar';
  checklist.phases.forEach((phase, i) => {
    const done = phase.items.every(it => checked[it.id]);
    const count = phase.items.filter(it => checked[it.id]).length;
    const tab = document.createElement('button');
    tab.className = 'phase-tab' + (i === currentPhase ? ' on' : '') + (done ? ' done' : '');
    const timerText = phaseTimers[phase.id] ? getPhaseTime(phase.id) : '';
    tab.innerHTML = `${phase.name}<span class="phase-count">${count}/${phase.items.length}</span>${timerText ? `<span class="phase-timer">${timerText}</span>` : ''}`;
    tab.addEventListener('click', () => { currentPhase = i; phaseChanged = true; renderChecklist(); });
    bar.appendChild(tab);
  });
  app.appendChild(bar);

  // Items
  const items = document.createElement('div');
  items.className = 'items';
  items.id = 'itemsList';
  const phase = checklist.phases[currentPhase];
  const firstUnchecked = phase.items.findIndex(it => !checked[it.id]);

  phase.items.forEach((item, idx) => {
    const isChecked = !!checked[item.id];
    const isCurrent = settings.mode === 'strict' && idx === firstUnchecked;
    const isLocked = settings.mode === 'strict' && idx > firstUnchecked && firstUnchecked >= 0 && !isChecked;

    const el = document.createElement('div');
    el.className = 'item' + (isChecked ? ' checked' : '') + (isCurrent ? ' current' : '') + (isLocked ? ' locked' : '') + (settings.check_method === 'swipe' ? ' swipe-mode' : '');
    el.dataset.label = (item.label || '').toLowerCase();
    el.dataset.expected = (item.expected || '').toLowerCase();

    let dotHtml = '';
    if (settings.check_feedback === 'on' && item.auto_detect) {
      dotHtml = `<div class="i-dot ${getAutoState(item)}"></div>`;
    }

    el.innerHTML = `
      <div class="chk"></div>
      <div class="i-body">
        <div class="i-top"><span class="i-label">${item.label}</span><span class="i-expected">${item.expected}</span></div>
        ${item.how_to ? `<div class="i-how">${item.how_to}${item.location ? `<div class="i-loc">${item.location}</div>` : ''}</div>` : ''}
      </div>
      ${dotHtml}
    `;

    // Swipe detection
    let touchStartX = 0;
    if (settings.check_method === 'swipe') {
      el.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
      el.addEventListener('touchend', e => {
        if (isLocked) return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        if (dx > 60 && !checked[item.id]) { doCheck(); } // swipe right = check
        if (dx < -60 && checked[item.id]) { doCheck(); }  // swipe left = uncheck
      });
    }

    el.querySelector('.chk').addEventListener('click', e => {
      e.stopPropagation(); if (isLocked) return;
      if (settings.check_method === 'swipe') return; // in swipe mode, checkbox doesn't work
      doCheck();
    });

    function doCheck() {
      const wasChecked = checked[item.id];
      checked[item.id] = !checked[item.id];

      if (checked[item.id]) {
        undoStack.push({ itemId: item.id, phaseIdx: currentPhase });
        if (undoStack.length > 20) undoStack.shift();
        if (settings.haptic === 'on') vibrate(30);
        if (settings.sound === 'on') playSound('check');
        // Voice: read next unchecked item
        if (voiceEnabled) {
          const nextIdx = phase.items.findIndex((it, i) => i > idx && !checked[it.id]);
          if (nextIdx >= 0) speak(`${phase.items[nextIdx].label}. ${phase.items[nextIdx].expected}`);
        }
      }

      saveChecked(checklist._id);

      // Check if phase just completed
      const phaseDone = phase.items.every(it => checked[it.id]);
      if (phaseDone && !lastPhaseDone[phase.id]) {
        lastPhaseDone[phase.id] = true;
        if (settings.haptic === 'on') vibrate([30, 50, 30]);
        if (settings.sound === 'on') playSound('phase');
        if (voiceEnabled) speak(`${phase.name} complete`);
      }

      // Check if ALL phases complete
      const allDone = checklist.phases.every(p => p.items.every(it => checked[it.id]));
      if (allDone) { if (settings.sound === 'on') playSound('complete'); if (settings.haptic === 'on') vibrate([30, 50, 30, 50, 60]); }

      // Auto-advance to next phase when current is complete
      if (settings.auto_advance === 'on') {
        const phaseDoneNow = phase.items.every(it => checked[it.id]);
        if (phaseDoneNow && currentPhase < checklist.phases.length - 1) {
          setTimeout(() => { currentPhase++; phaseChanged = true; renderChecklist(); }, 600);
          return;
        }
      }

      renderChecklist();
    }

    el.querySelector('.i-body').addEventListener('click', () => el.classList.toggle('expanded'));
    items.appendChild(el);
  });
  app.appendChild(items);

  // Apply search filter
  if (searchQuery) filterItems();

  // Scroll on phase change
  if (phaseChanged) {
    const activeTab = bar.querySelector('.phase-tab.on');
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    if (settings.mode === 'strict') {
      const cur = items.querySelector('.item.current');
      if (cur) setTimeout(() => cur.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
    }
    // Voice: read current item on phase switch
    if (voiceEnabled && firstUnchecked >= 0) {
      const ci = phase.items[firstUnchecked];
      speak(`${phase.name}. ${ci.label}. ${ci.expected}`);
    }
    phaseChanged = false;
  }

  // Bottom
  const total = checklist.phases.reduce((s, p) => s + p.items.length, 0);
  const done = Object.values(checked).filter(Boolean).length;
  const phaseDoneCount = phase.items.filter(it => checked[it.id]).length;
  const bottom = document.createElement('div');
  bottom.className = 'bottom';
  bottom.innerHTML = `
    <div class="progress">
      <span class="progress-text"><strong>${phaseDoneCount}</strong>/${phase.items.length}</span>
      <div class="progress-bar"><div class="progress-fill" style="width:${total ? (done/total*100) : 0}%"></div></div>
      <span class="progress-text" style="opacity:.5">${done}/${total}</span>
    </div>
    <div class="bottom-btns">
      ${undoStack.length > 0 ? '<button class="b-btn undo" id="undoBtn">UNDO</button>' : ''}
      ${phaseDoneCount === phase.items.length && currentPhase < checklist.phases.length - 1 ? '<button class="b-btn next" id="nextPhase">NEXT &#9654;</button>' : ''}
      <button class="b-btn danger" id="resetBtn">RESET</button>
    </div>
  `;
  app.appendChild(bottom);

  const nb = document.getElementById('nextPhase');
  if (nb) nb.addEventListener('click', () => { currentPhase++; phaseChanged = true; renderChecklist(); });
  document.getElementById('resetBtn')?.addEventListener('click', () => {
    checked = {}; undoStack = []; phaseTimers = {}; lastPhaseDone = {};
    saveChecked(checklist._id);
    fetch(API + '/api/checklist-reset', { method: 'POST' }).catch(() => {});
    renderChecklist();
  });
  document.getElementById('undoBtn')?.addEventListener('click', () => {
    const last = undoStack.pop();
    if (last) {
      delete checked[last.itemId];
      lastPhaseDone = {};
      saveChecked(checklist._id);
      if (last.phaseIdx !== currentPhase) { currentPhase = last.phaseIdx; phaseChanged = true; }
      renderChecklist();
    }
  });
}

// ═══ SEARCH ═══
function filterItems() {
  const q = searchQuery.toLowerCase();
  document.querySelectorAll('.item').forEach(el => {
    if (!q) { el.classList.remove('hidden'); return; }
    const match = el.dataset.label.includes(q) || el.dataset.expected.includes(q);
    el.classList.toggle('hidden', !match);
  });
}

// ═══ AUTO-DETECT ═══
function getAutoState(item) {
  if (!item.auto_detect) return 'unknown';
  const mappings = { 'MASTER BATTERY SWITCH': 'MASTER_BATTERY', 'FUEL TANK SELECTOR:1': 'FUEL_SEL' };
  const key = mappings[item.auto_detect.var_name] || item.auto_detect.var_name;
  if (simValues[key] !== undefined) {
    try { return new Function('v', `return v ${item.auto_detect.condition}`)(simValues[key]) ? 'ok' : 'fail'; } catch {}
  }
  return 'unknown';
}

// ═══ POLL ═══
let pollTimer = null, settingsSyncCount = 0;

function startPoll() {
  if (pollTimer) clearTimeout(pollTimer);
  async function poll() {
    try {
      const r = await fetch(API + '/api/sim-state');
      const d = await r.json();
      simValues = d.values || {};

      if (settings.auto_check === 'on' && checklist) {
        let changed = false;
        checklist.phases.forEach(phase => {
          phase.items.forEach(item => {
            if (!checked[item.id] && item.auto_detect && getAutoState(item) === 'ok') {
              checked[item.id] = true; changed = true;
              undoStack.push({ itemId: item.id, phaseIdx: currentPhase });
              playSound('check');
            }
          });
        });
        if (changed) { saveChecked(checklist._id); renderChecklist(); }
      }

      document.querySelectorAll('.item').forEach((el, idx) => {
        const phase = checklist?.phases[currentPhase];
        if (!phase?.items[idx]) return;
        const dot = el.querySelector('.i-dot');
        if (dot) dot.className = 'i-dot ' + getAutoState(phase.items[idx]);
      });
    } catch {}

    // Sync checklist progress from server (multi-crew)
    settingsSyncCount++;
    if (settingsSyncCount % 2 === 0) {
      try {
        const r = await fetch(API + '/api/checklist-progress');
        if (r.ok) {
          const server = await r.json();
          let changed = false;
          for (const [k, v] of Object.entries(server)) {
            if (v && !checked[k]) { checked[k] = true; changed = true; }
          }
          // Also detect unchecks from other crew
          for (const k of Object.keys(checked)) {
            if (checked[k] && server[k] === undefined) { delete checked[k]; changed = true; }
          }
          if (changed) { localStorage.setItem('cockpitflow_cl_' + checklist._id, JSON.stringify(checked)); renderChecklist(); }
        }
      } catch {}
    }

    // Sync settings from desktop
    if (settingsSyncCount % 3 === 0) {
      try {
        const r = await fetch(API + '/api/settings');
        if (r.ok) {
          const s = await r.json();
          let changed = false;
          if (s.mode && s.mode !== settings.mode) { settings.mode = s.mode; changed = true; }
          if (s.auto_check && s.auto_check !== settings.auto_check) { settings.auto_check = s.auto_check; changed = true; }
          if (s.check_feedback && s.check_feedback !== settings.check_feedback) { settings.check_feedback = s.check_feedback; changed = true; }
          if (s.haptic) settings.haptic = s.haptic;
          if (s.sound) settings.sound = s.sound;
          if (s.check_method && s.check_method !== settings.check_method) { settings.check_method = s.check_method; changed = true; }
          if (s.auto_advance) settings.auto_advance = s.auto_advance;
          if (changed) renderChecklist();
        }
      } catch {}
    }

    pollTimer = setTimeout(poll, 1000);
  }
  poll();
}

init();
</script>
