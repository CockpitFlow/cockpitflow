<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>CockpitFlow Cockpit</title>
<link rel="stylesheet" href="/cf-theme.css">
<style>
html, body { height: 100dvh; overflow: hidden; touch-action: manipulation; user-select: none; margin: 0; padding: 0; background: #06080c; }

.cockpit {
  display: grid;
  width: 100vw;
  height: 100dvh;
  gap: 1px;
  background: #06080c;
}
.cockpit > * {
  background: var(--cf-bg, #0a0e14);
  overflow: hidden;
  padding: 4px;
}

.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; align-items: center; gap: 6px;
  padding: 2px 10px; background: var(--cf-bg, #0a0e14);
  border-top: 1px solid rgba(255,255,255,.04);
  font-size: 7px; color: var(--cf-dark, #3a3d44); z-index: 100;
}
.status-name {
  flex: 1; text-align: right;
  font-family: var(--cf-font-display, 'Orbitron', sans-serif); font-size: 6px;
  letter-spacing: 3px; color: var(--cf-border, #2a2d33);
}

/* Landscape prompt */
.rotate-prompt {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #06080c;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  color: #5a5e66; font-family: 'Orbitron', system-ui, sans-serif;
}
.rotate-prompt svg { width: 48px; height: 48px; color: #4a9eff; animation: rotate-hint 2s ease-in-out infinite; }
.rotate-prompt span { font-size: 11px; letter-spacing: 2px; font-weight: 700; }
@keyframes rotate-hint { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }
@media (orientation: portrait) {
  .rotate-prompt { display: flex; }
  .cockpit, .status-bar { display: none; }
}
</style>
</head>
<body>

<!-- Landscape prompt -->
<div class="rotate-prompt">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="4" y="2" width="16" height="20" rx="2"/>
    <path d="M12 18h.01"/>
  </svg>
  <span>ROTATE TO LANDSCAPE</span>
</div>

<div class="cockpit" id="cockpit"></div>
<div class="status-bar">
  <span class="cf-status-dot" id="sDot"></span>
  <span id="sTxt">CONNECTING</span>
  <span class="status-name">COCKPITFLOW</span>
</div>

<script type="module" src="/cf-widgets.js"></script>
<script>
const _p = new URLSearchParams(window.location.search);
const API = _p.get('api') || window.location.origin;

// Tag → preset type mapping (for backward compat)
const TYPE_TO_TAG = {
  'lever': 'cf-slider',
  'toggle': 'cf-toggle',
  'gauge': 'cf-display',
  'magneto': 'cf-button-group',
  'yoke': 'cf-yoke',
  'flaps': 'cf-button-group',
  'trim': 'cf-knob',
  'fuel-selector': 'cf-button-group',
  'radio': 'cf-display',
  'button': 'cf-button',
  'knob': 'cf-knob',
  'indicator': 'cf-indicator',
  'label': 'cf-label',
};

const widgets = {}; // id → { el, comp }

async function send(cmd, val) {
  try { await fetch(API + '/api/command', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cmd, value: val }) }); } catch {}
}

// Listen for all widget input events
document.addEventListener('cf-input', e => {
  const { cmd, value } = e.detail;
  if (cmd) send(cmd, value);
});

function buildCockpit(preset) {
  const root = document.getElementById('cockpit');
  root.innerHTML = '';

  // Apply theme
  const t = preset.theme || {};
  for (const [k, v] of Object.entries(t)) {
    if (v) document.documentElement.style.setProperty(`--cf-${k}`, v);
  }

  // Grid
  const g = preset.grid || { cols: 12, rows: 8 };
  root.style.gridTemplateColumns = `repeat(${g.cols}, 1fr)`;
  root.style.gridTemplateRows = `repeat(${g.rows}, 1fr)`;

  // Components
  (preset.components || []).forEach(comp => {
    const tag = comp.tag || TYPE_TO_TAG[comp.type] || 'cf-label';

    // Wait for custom element to be defined
    const el = document.createElement(tag);

    // Set all props as attributes
    if (comp.label) el.setAttribute('label', comp.label);
    if (comp.cmd) el.setAttribute('cmd', comp.cmd);
    if (comp.dataref) el.setAttribute('dataref', comp.dataref);
    if (comp.color) el.setAttribute('color', comp.color);
    if (comp.unit) el.setAttribute('unit', comp.unit);
    if (comp.format) el.setAttribute('format', comp.format);
    if (comp.default !== undefined) el.setAttribute('value', comp.default);
    if (comp.style) el.setAttribute('color', comp.style === 'red' ? 'red' : 'accent');
    if (comp.step) el.setAttribute('step', comp.step);
    if (comp.min !== undefined) el.setAttribute('min', comp.min);
    if (comp.max !== undefined) el.setAttribute('max', comp.max);

    // Complex props as JSON attributes
    if (comp.thresholds) el.setAttribute('thresholds', JSON.stringify(comp.thresholds));
    if (comp.modes) el.setAttribute('modes', JSON.stringify(comp.modes));
    if (comp.sensitivity) el.setAttribute('sensitivity', comp.sensitivity);
    if (comp.deadzone) el.setAttribute('deadzone', comp.deadzone);
    if (comp.cmd_ail) el.setAttribute('cmd-ail', comp.cmd_ail);
    if (comp.cmd_elv) el.setAttribute('cmd-elv', comp.cmd_elv);

    // Button group: convert various formats to options JSON
    if (tag === 'cf-button-group') {
      let options = [];
      if (comp.positions && Array.isArray(comp.positions)) {
        // Magneto: ["OFF","R","L","BOTH","START"] or [{value,label}]
        options = comp.positions.map((p, i) =>
          typeof p === 'string' ? { value: i, label: p } : p
        );
      }
      if (comp.detents) {
        options = comp.detents.map(d => ({ value: d.value, label: d.label }));
      }
      el.setAttribute('options', JSON.stringify(options));
      if (comp.spring_back) el.setAttribute('spring', JSON.stringify(comp.spring_back));
    }

    // Knob defaults for trim
    if (comp.type === 'trim' && tag === 'cf-knob') {
      el.setAttribute('min', '-100');
      el.setAttribute('max', '100');
      el.setAttribute('step', comp.step ? String(Math.round(comp.step * 100)) : '3');
      el.setAttribute('format', 'int');
    }

    // Radio display
    if (comp.type === 'radio') {
      el.setAttribute('value', '0');
      if (comp.default_freq) el.setAttribute('label', `${comp.label} ${comp.default_freq}`);
    }

    // Grid placement
    el.style.gridColumn = `${comp.col} / span ${comp.w || 1}`;
    el.style.gridRow = `${comp.row} / span ${comp.h || 1}`;

    root.appendChild(el);
    widgets[comp.id] = { el, comp };
  });
}

// Poll sim state
async function poll() {
  try {
    const resp = await fetch(API + '/api/sim-state');
    const data = await resp.json();
    const v = data.values || {};

    document.getElementById('sDot').className = 'cf-status-dot' + (data.connected ? ' on' : '');
    document.getElementById('sTxt').textContent = data.connected ? 'CONNECTED' : 'OFFLINE';

    // Update widgets
    for (const [id, w] of Object.entries(widgets)) {
      const { el, comp } = w;
      if (typeof el.setValue !== 'function') continue;

      if (comp.dataref && v[comp.dataref] !== undefined) {
        el.setValue(v[comp.dataref]);
      } else if (comp.cmd && v[comp.cmd] !== undefined) {
        el.setValue(v[comp.cmd]);
      }
    }
  } catch {}
  setTimeout(poll, 500);
}

// Init
async function init() {
  const presetName = _p.get('preset') || 'cessna-172';
  try {
    let resp = await fetch(API + `/api/module/cockpit/preset/${presetName}`);
    if (!resp.ok) throw new Error('Preset not found: ' + presetName);
    const preset = await resp.json();
    buildCockpit(preset);
  } catch (e) {
    document.getElementById('cockpit').innerHTML = `<div style="padding:20px;color:var(--cf-red)">Failed to load preset: ${e.message}</div>`;
  }
  poll();
}

// Wait for widgets to register then init
customElements.whenDefined('cf-slider').then(init).catch(init);
</script>
</body>
</html>
