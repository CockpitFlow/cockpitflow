<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SkyFlow Panel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: monospace; touch-action: manipulation; }
  #container { position: relative; display: inline-block; max-width: 100vw; max-height: 100vh; }
  #panel-img { display: block; max-width: 100vw; max-height: 100vh; object-fit: contain; }
  #overlay { position: absolute; inset: 0; }
  .btn { position: absolute; border: 1px solid rgba(150,150,150,0.3); border-radius: 3px; background: rgba(80,80,80,0.2); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: monospace; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-shadow: 0 0 4px #000; -webkit-tap-highlight-color: transparent; user-select: none; }
  .btn:active { background: rgba(180,180,180,0.5); }
  .btn-accent { border-color: rgba(74,158,255,0.5); background: rgba(74,158,255,0.2); }
  .btn-accent:active { background: rgba(74,158,255,0.7); }
  .btn-flip { border-color: rgba(52,208,88,0.3); background: rgba(52,208,88,0.12); }
  .btn-flip:active { background: rgba(52,208,88,0.4); }
  .knob { border-radius: 50%; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); font-size: 14px; }
  .knob:active { background: rgba(255,255,255,0.3); }
  #status { position: fixed; top: 8px; left: 8px; color: #444; font-size: 10px; z-index: 10; }
  #no-signal { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #333; font-size: 14px; flex-direction: column; gap: 8px; }
</style>
</head>
<body>

<div id="status">SkyFlow Panel</div>

<div id="container">
  <img id="panel-img" src="" alt="Panel" />
  <div id="overlay"></div>
  <div id="no-signal"><span>NO SIGNAL</span><span style="font-size:10px;color:#222">Start capture in SkyFlow desktop</span></div>
</div>

<script>
const API = window.location.origin;
const img = document.getElementById('panel-img');
const overlay = document.getElementById('overlay');
const noSignal = document.getElementById('no-signal');
const status = document.getElementById('status');

// Buttons loaded from API (synced with desktop)
let buttons = [
  { id: 'COM1_COARSE', label: '\u25C0', x: 1, y: 2, w: 5.5, h: 16, s: 'knob' },
  { id: 'COM1_FINE', label: '\u25B6', x: 7, y: 5, w: 4, h: 12, s: 'knob' },
  { id: 'COM1_FLIP', label: '\u21C5', x: 4, y: 20, w: 5, h: 6, s: 'btn-flip' },
  { id: 'NAV1_COARSE', label: '\u25C0', x: 1, y: 28, w: 5.5, h: 16, s: 'knob' },
  { id: 'NAV1_FINE', label: '\u25B6', x: 7, y: 31, w: 4, h: 12, s: 'knob' },
  { id: 'NAV1_FLIP', label: '\u21C5', x: 4, y: 46, w: 5, h: 6, s: 'btn-flip' },
  { id: 'GPS_CDI', label: 'COM\nVLOC', x: 3, y: 54, w: 8, h: 10, s: 'btn-flip' },
  { id: 'PUSH_CV', label: 'PUSH', x: 1, y: 68, w: 9, h: 8, s: 'btn' },
  { id: 'CDI_BTN', label: 'CDI', x: 14, y: 88, w: 8, h: 10, s: 'btn' },
  { id: 'GPS_OBS', label: 'OBS', x: 23, y: 88, w: 9, h: 10, s: 'btn' },
  { id: 'GPS_MSG', label: 'MSG', x: 33, y: 88, w: 9, h: 10, s: 'btn' },
  { id: 'GPS_FPL', label: 'FPL', x: 43, y: 88, w: 8, h: 10, s: 'btn' },
  { id: 'GPS_PROC', label: 'PROC', x: 52, y: 88, w: 9, h: 10, s: 'btn' },
  { id: 'GPS_ZOOM_OUT', label: '\u2212', x: 87, y: 2, w: 5, h: 12, s: 'knob' },
  { id: 'GPS_ZOOM_IN', label: '+', x: 93, y: 2, w: 5, h: 12, s: 'knob' },
  { id: 'GPS_DIRECT', label: 'D\u2192', x: 87, y: 18, w: 11, h: 8, s: 'btn' },
  { id: 'GPS_MENU', label: 'MENU', x: 87, y: 28, w: 11, h: 8, s: 'btn' },
  { id: 'GPS_CLR', label: 'CLR', x: 87, y: 38, w: 11, h: 8, s: 'btn' },
  { id: 'GPS_ENT', label: 'ENT', x: 87, y: 48, w: 11, h: 8, s: 'btn-accent' },
  { id: 'GPS_NAV', label: 'GPS', x: 88, y: 58, w: 10, h: 7, s: 'btn-flip' },
  { id: 'GPS_OUTER', label: '\u25C0', x: 86, y: 70, w: 6, h: 14, s: 'knob' },
  { id: 'GPS_INNER', label: '\u25B6', x: 93, y: 73, w: 5, h: 10, s: 'knob' },
  { id: 'GPS_CURSOR', label: 'CRSR', x: 87, y: 86, w: 11, h: 8, s: 'btn' },
];

function renderButtons(btns) {
  overlay.innerHTML = '';
  btns.forEach(b => {
    const el = document.createElement('div');
    el.className = 'btn ' + (b.s || b.style || 'btn');
    el.style.cssText = `left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%`;
    el.textContent = b.label;
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); sendCommand(b.id); });
    overlay.appendChild(el);
  });
}

// Load overlay from API, fallback to hardcoded
async function loadOverlay() {
  try {
    const res = await fetch(API + '/api/overlay');
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      buttons = data;
      renderButtons(buttons);
      return;
    }
  } catch {}
  renderButtons(buttons);
}
loadOverlay();
setInterval(loadOverlay, 5000); // refresh every 5s

// Initial render from hardcoded (overwritten by API)
renderButtons(buttons);

// Send command to sim via API
async function sendCommand(cmd) {
  try {
    await fetch(API + '/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cmd, value: 1 })
    });
  } catch {}
}

// Poll capture frames
let hasSignal = false;
async function poll() {
  try {
    const res = await fetch(API + '/api/capture');
    const data = await res.json();
    if (data.image && data.image.length > 50) {
      img.src = data.image;
      if (!hasSignal) { hasSignal = true; noSignal.style.display = 'none'; }
      status.textContent = 'SkyFlow Panel - LIVE';
    } else {
      if (hasSignal) { hasSignal = false; noSignal.style.display = 'flex'; }
      status.textContent = 'SkyFlow Panel - NO CAPTURE';
    }
  } catch {
    status.textContent = 'SkyFlow Panel - OFFLINE';
  }
  setTimeout(poll, 100);
}
poll();
</script>
</body>
</html>
